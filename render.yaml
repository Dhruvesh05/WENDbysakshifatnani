services:
  - type: web
    name: wend-client-admin-panel
    env: node
    rootDir: client-admin-panel
    plan: starter
    buildCommand: npm ci ; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://wendbysakshifatnani-edtn.onrender.com
      - key: AUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: wend-media
      - key: CORS_ORIGIN
        value: https://wendbysakshifatnani.vercel.app,http://localhost:3000,http://localhost:5173
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_IP_FAMILY
        value: "4"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        sync: false
